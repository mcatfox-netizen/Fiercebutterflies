<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fierce Butterflies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  body {
    min-height: 100vh;
    width: 100%;
    background: #F6EFE3;
    color: #1C1714;
    font-family: 'Geist', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
  }

  .content { animation: fadeIn 700ms cubic-bezier(0.22, 1, 0.36, 1) both; }

  .mark { width: 56px; height: auto; color: #DD6B1F; display: block; margin: 0 auto 32px; }

  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #A8430C;
    margin-bottom: 20px;
  }
  .eyebrow::before {
    content: "";
    display: inline-block;
    width: 24px;
    height: 1px;
    background: #DD6B1F;
    vertical-align: middle;
    margin-right: 10px;
    transform: translateY(-2px);
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 0 0 24px;
    text-wrap: pretty;
  }

  p.lede {
    font-size: 19px;
    line-height: 1.6;
    color: #6b5c52;
    max-width: 480px;
    margin: 0 auto 40px;
  }

  hr { border: 0; height: 1px; background: #DD6B1F; width: 64px; margin: 0 auto 40px; }

  form {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 420px;
    margin: 0 auto;
  }

  input[type="email"] {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    padding: 14px 18px;
    border: 1px solid #cbbeae;
    border-radius: 8px;
    background: #fffaf0;
    color: #1C1714;
    outline: none;
    flex: 1;
    min-width: 200px;
  }

  button {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 24px;
    border: none;
    border-radius: 999px;
    background: #1C1714;
    color: #F6EFE3;
    cursor: pointer;
    transition: background 140ms ease-out;
  }
  button:hover { background: #3a2e26; }

  p.footer { font-size: 12px; color: #a89b8e; margin: 40px 0 0; }
</style>
</head>
<body>
  <div class="content">
    <svg class="mark" viewBox="0 0 240 200" role="img" aria-label="Fierce Butterflies mark">
      <g fill="currentColor" stroke="none">
        <path d="M118 46 C 116 46 114 48 114 51 L 114 142 C 114 148 116 154 120 158 C 124 154 126 148 126 142 L 126 51 C 126 48 124 46 122 46 Z"></path>
        <circle cx="120" cy="42" r="6"></circle>
        <path d="M114 56 C 92 36 60 26 32 30 C 18 32 10 44 14 60 C 18 78 38 88 62 90 C 84 92 102 84 114 72 Z"></path>
        <path d="M126 56 C 148 36 180 26 208 30 C 222 32 230 44 226 60 C 222 78 202 88 178 90 C 156 92 138 84 126 72 Z"></path>
        <path d="M114 96 C 100 104 80 116 68 132 C 60 144 64 158 78 162 C 92 164 108 152 114 138 C 116 130 116 116 114 104 Z"></path>
        <path d="M126 96 C 140 104 160 116 172 132 C 180 144 176 158 162 162 C 148 164 132 152 126 138 C 124 130 124 116 126 104 Z"></path>
      </g>
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M117 38 C 110 28, 104 22, 96 18"></path>
        <path d="M123 38 C 130 28, 136 22, 144 18"></path>
      </g>
    </svg>

    <div class="eyebrow">Fierce Butterflies</div>

    <h1>Something <em>fierce</em> is coming</h1>

    <p class="lede">I'm building the new home for the practice. Coaching, actually — for women who are done waiting.</p>

    <hr>

    <p class="footer">Fierce Butterflies &middot; 2026</p>
  </div>
</body>
</html>
